apiVersion: v1
kind: Secret
metadata:
  name: pxc-cluster-secrets
type: Opaque
stringData:
  root: "RootPass123!"
  xtrabackup: "BackupPass123!"
  monitor: "MonitorPass123!"
  clustercheck: "ClusterCheckPass123!"
  proxyadmin: "ProxyAdminPass123!"
  operator: "OperatorPass123!"
  replication: "ReplicationPass123!"
---
apiVersion: pxc.percona.com/v1
kind: PerconaXtraDBCluster
metadata:
  name: pxc-cluster
spec:
  secretsName: pxc-cluster-secrets
  pxc:
    size: 3
    image: percona/percona-xtradb-cluster:8.0.36-28.1
    resources:
      requests:
        memory: "2Gi"
        cpu: "500m"
      limits:
        memory: "2Gi"
        cpu: "2"
    volumeSpec:
      persistentVolumeClaim:
        storageClassName: ssd-turbo
        resources:
          requests:
            storage: 6Gi
    livenessProbes:
      initialDelaySeconds: 5
      periodSeconds: 2
      timeoutSeconds: 2
      failureThreshold: 1
    readinessProbes:
      initialDelaySeconds: 5
      periodSeconds: 2
      timeoutSeconds: 2
      failureThreshold: 1
    configuration: |
      [mysqld]
      innodb_buffer_pool_size = 6G
      innodb_buffer_pool_instances = 6
      max_connections = 500
  haproxy:
    enabled: true
    size: 1
    image: percona/haproxy:2.8.11
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
data:
  DB_HOST: "pxc-cluster-haproxy"
  DB_NAME: "app"
  DB_USER: "app"
  DB_PASSWORD: "AppUserPass123!"
---
apiVersion: v1
kind: Pod
metadata:
  name: backend
  labels:
    app: backend
spec:
  containers:
    - name: nginx
      image: nginx:1.27
      envFrom:
        - configMapRef:
            name: backend-config
      ports:
        - containerPort: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-egress
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: pxc-cluster
      ports:
        - protocol: TCP
          port: 3306